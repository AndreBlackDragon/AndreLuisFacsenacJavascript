<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Idade</title>
</head>
<body>
    <h1>Idade</h1>
    
    <script>
        let idade 

        idade = prompt("Digite sua idade: ");

        idade = parseInt(idade) + 5;
        alert("Sua idade daqui a 5 anos será: " + idade)
    </script>
</body>
</html>
