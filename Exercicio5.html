<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
</head>
<body>
    <h1>Welcome</h1>
    
    <script>
        let idade = prompt("Digite sua idade: ");

        if (idade < 12) {
            alert("criança.");
        } else if (idade >= 12 && idade < 18) {
            alert("adolescente.");
        } else {
            alert("adulto.");
        }

        
    </script>
</body>
