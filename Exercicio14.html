<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
</head>
<body>
    <h1>Welcome</h1>
    
    <script>
        const pessoa = {
            marca: "Toyota",
            modelo: "Corolla",
            ano: 2020,
            descricao() {
                return "Marca: " + this.marca + ", Modelo: " + this.modelo + ", Ano: " + this.ano;
            }
        };

        alert("Descrição: " + pessoa.descricao());
    </script>
</body>
</html>
